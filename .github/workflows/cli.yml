name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-test:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run flake8 (code quality)
      run: flake8 .

    - name: Run tests
      run: pytest -v